<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Fondo con degradado elegante -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cuerpo del Icono -->
  <rect width="440" height="440" x="36" y="36" rx="100" fill="white" />
  <rect width="440" height="440" x="36" y="36" rx="100" fill="url(#grad)" fill-opacity="0.05" />
  
  <!-- Símbolo Central -->
  <g filter="url(#shadow)">
    <path d="M360 180V140C360 117.909 342.091 100 320 100H120C97.9086 100 80 117.909 80 140V372C80 394.091 97.9086 412 120 412H320C342.091 412 360 394.091 360 372V332" stroke="#059669" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="280" y="180" width="152" height="152" rx="40" fill="#059669" />
    <path d="M340 230V282M310 256H370" stroke="white" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
